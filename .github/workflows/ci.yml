name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install dependencies
      run: poetry install --no-interaction --no-ansi

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install Playwright browsers
      run: poetry run python -m playwright install --with-deps chromium

    - name: Print versions
      run: |
        python --version
        poetry --version
        poetry run python -c "import sys; print(sys.executable)"
        poetry run pytest --version

    - name: Run tests
      run: poetry run pytest

    - name: Run content comparison
      run: poetry run python compare_tool.py --input data/test_data.json --ci

    - name: Upload comparison artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: content-compare-results
        path: artifacts/content_compare/
